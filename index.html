<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Ezer - Solana chat terminal for memecoin and trading education." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <title>Ezer</title>
  <link rel="stylesheet" href="chat.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Krona+One&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  

</head>
<body>
    <a class="x-link-btn top-x-link" href="https://x.com/_ppotat0" target="_blank" rel="noopener noreferrer" aria-label="Open pinkpotato on X">
      <svg class="x-logo" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M18.901 1.153h3.68l-8.039 9.188L24 22.847h-7.406l-5.8-7.584-6.637 7.584H.474l8.596-9.826L0 1.153h7.594l5.243 6.932 6.064-6.932Zm-1.291 19.492h2.039L6.486 3.24H4.298L17.61 20.645Z"></path>
      </svg>
    </a>
    <div class="card">
        <div class="ai-main-wrapper">
            <h1>Ezer</h1>
        </div>
        <div class="ai-container">
            <div class="ai-header">
                <p class="ai-subtitle">ask me anything about solana, memecoin basics, and cryptocurrency.</p>
            </div>
            <div class="chat-container" id="chat-container">
                <!-- Chat messages will be appended here -->
            </div>
            <form id="chat-form" autocomplete="off">
                <input type="text" id="user-input" class="ai-chat-input" placeholder="Type your message..." required autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" name="lyceum-chat-input">
                <button id="send-btn" class="ai-send-btn">Send</button>
            </form>
        </div>
    </div>
    <footer class="page-footer">
      <p>&copy; pinkpotato 2026</p>
    </footer>

    <script type="module" src="script.js"></script>
</body>
</html>
